name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ApesDb.slnx

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build ApesDb.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution ApesDb.slnx --configuration Release --no-build
