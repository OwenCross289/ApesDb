name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Restore local tools
        run: dotnet tool restore

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore
        run: dotnet restore ApesDb.slnx

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Check frontend formatting
        run: pnpm format:check

      - name: Lint frontend
        run: pnpm lint

      - name: Build
        run: dotnet build ApesDb.slnx --configuration Release --no-restore

      - name: Build frontend
        run: pnpm build

      - name: Test
        run: dotnet test --solution ApesDb.slnx --configuration Release --no-build
