services:
  api:
    image: ghcr.io/owencross289/apesdb:latest
    ports:
      - "8080"

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: apesdb
      POSTGRES_USER: apesdb
      POSTGRES_PASSWORD: apesdb
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:8
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
