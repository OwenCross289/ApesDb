services:
  app:
    image: ghcr.io/owencross289/apesdb/app:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__ConnectionString: Host=postgres;Port=5432;Database=apesdb;Username=apesdb;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Cache__ConnectionString: redis:6379
      Cache__Password: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      Auth0__Domain: ${AUTH0_DOMAIN:?AUTH0_DOMAIN is required}
      Auth0__ClientId: ${AUTH0_CLIENT_ID:?AUTH0_CLIENT_ID is required}
      Auth0__ClientSecret: ${AUTH0_CLIENT_SECRET:?AUTH0_CLIENT_SECRET is required}
      Auth0__CallbackPath: /api/auth/callback
      Auth0__PostLogoutRedirectUri: /
    ports:
      - "8080"
    depends_on:
      - migrations
      - redis

  worker:
    image: ghcr.io/owencross289/apesdb/worker:latest
    environment:
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8081
      Database__ConnectionString: Host=postgres;Port=5432;Database=apesdb;Username=apesdb;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Igdb__ClientId: ${IGDB_CLIENT_ID:?IGDB_CLIENT_ID is required}
      Igdb__ClientSecret: ${IGDB_CLIENT_SECRET:?IGDB_CLIENT_SECRET is required}
      Cache__ConnectionString: redis:6379
      Cache__Password: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TickerQ__Dashboard__BasePath: /tickerq/dashboard
      TickerQ__Dashboard__Username: ${TICKERQ_DASHBOARD_USERNAME:?TICKERQ_DASHBOARD_USERNAME is required}
      TickerQ__Dashboard__Password: ${TICKERQ_DASHBOARD_PASSWORD:?TICKERQ_DASHBOARD_PASSWORD is required}
    ports:
      - "8081"
    depends_on:
      - migrations
      - redis

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: apesdb
      POSTGRES_USER: apesdb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql

  migrations:
    image: ghcr.io/owencross289/apesdb/migrations:latest
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/apesdb
      FLYWAY_USER: apesdb
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      FLYWAY_CONNECT_RETRIES: "60"
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_DEFAULT_SCHEMA: migrations
      FLYWAY_SCHEMAS: migrations,public,worker
    depends_on:
      - postgres
    deploy:
      mode: replicated-job
      replicas: 1

  redis:
    image: redis:8
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
