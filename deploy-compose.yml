services:
  app:
    image: ghcr.io/owencross289/apesdb/app:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=apesdb;Username=apesdb;Password=apesdb
      ConnectionStrings__Redis: redis:6379
      Auth0__Domain: ${AUTH0_DOMAIN}
      Auth0__ClientId: ${AUTH0_CLIENT_ID}
      Auth0__ClientSecret: ${AUTH0_CLIENT_SECRET}
      Auth0__CallbackPath: /api/auth/callback
      Auth0__PostLogoutRedirectUri: /
      Igdb__ClientId: ${IGDB_CLIENT_ID}
      Igdb__ClientSecret: ${IGDB_CLIENT_SECRET}
    ports:
      - "8080"
    depends_on:
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_started

  worker:
    image: ghcr.io/owencross289/apesdb/worker:latest
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=apesdb;Username=apesdb;Password=apesdb
      ConnectionStrings__Redis: redis:6379
    depends_on:
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_started

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: apesdb
      POSTGRES_USER: apesdb
      POSTGRES_PASSWORD: apesdb
    volumes:
      - postgres-data:/var/lib/postgresql

  flyway:
    image: flyway/flyway:11-alpine
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/apesdb
      FLYWAY_USER: apesdb
      FLYWAY_PASSWORD: apesdb
      FLYWAY_CONNECT_RETRIES: 60
      FLYWAY_BASELINE_ON_MIGRATE: true
      FLYWAY_DEFAULT_SCHEMA: migrations
      FLYWAY_SCHEMAS: migrations,public
    volumes:
      - ./db/migrations:/flyway/sql:ro
    depends_on:
      - postgres

  redis:
    image: redis:8
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
