services:
  postgres:
    image: postgres:18
    container_name: apesdb-postgres
    environment:
      POSTGRES_DB: apesdb
      POSTGRES_USER: apesdb
      POSTGRES_PASSWORD: apesdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: apesdb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
