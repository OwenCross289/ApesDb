services:

  postgres:
    image: postgres:18
    container_name: apesdb-postgres
    environment:
      POSTGRES_DB: apesdb
      POSTGRES_USER: apesdb
      POSTGRES_PASSWORD: apesdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  flyway:
    image: flyway/flyway:12-alpine
    container_name: apesdb-flyway
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/apesdb
      FLYWAY_USER: apesdb
      FLYWAY_PASSWORD: apesdb
      FLYWAY_CONNECT_RETRIES: "60"
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_DEFAULT_SCHEMA: migrations
      FLYWAY_SCHEMAS: migrations,public
    volumes:
      - ./db/migrations:/flyway/sql:ro
    depends_on:
      - postgres

  redis:
    image: redis:8
    container_name: apesdb-redis
    command: redis-server --requirepass apesdb
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
